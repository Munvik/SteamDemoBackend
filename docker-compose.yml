services:
  postgres:
    image: postgres:16
    container_name: steamstore-postgres
    environment:
      POSTGRES_DB: SteamStoreDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports: 
     - "5432:5432"

    volumes:
        - steamstore-postgres-data:/var/lib/postgresql/data
    healthcheck:
          test: ["CMD-SHELL", "pg_isready -U postgres -d SteamStoreDb"]
          interval: 5s
          timeout: 5s
          retries: 10

  api:
    container_name: steamstore-api
    image: ghcr.io/munvik/steamdemobackend:latest
    depends_on:
        postgres:
          condition: service_healthy
    environment:
        ASPNETCORE_ENVIRONMENT: Development
        ConnectionStrings__DefaultConnection: "Host=postgres;Database=SteamStoreDb;Username=postgres;Password=postgres"
        ASPNETCORE_URLS: http://+:5000
    ports:
      - "5001:5000"

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
     - "6379:6379"

volumes:
  steamstore-postgres-data:      

